name: Build Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build data
        run: |
          python scripts/build_data.py
      - name: Commit data updates
        run: |
          git config user.name "bot-dashboard"
          git config user.email "bot-dashboard@users.noreply.github.com"
          git add data/overview.json
          git commit -m "chore: refresh dashboard data" || echo "No changes"
          git push
